        - releases/upgrade/index.md
        - releases/upgrade/1.md
        - releases/upgrade/0.20.md
        - releases/upgrade/0.19.md
      - releases/changelog.md
  - Polars Cloud: https://docs.cloud.pola.rs/polars-cloud/
  - Polars On-Prem: https://docs.cloud.pola.rs/polars-on-premises/
not_in_nav: |
    /_build/
validation:
    links:
        # Allow an absolute link to the features page for our code snippets
        absolute_links: ignore

# Build directories
theme:
    name: material
    locale: en
    custom_dir: docs/source/_build/overrides
    palette:
        # Palette toggle for light mode
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: custom
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: custom
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
    logo: _build/assets/logo.png
    features:
        - navigation.tracking
        - navigation.sections
        - navigation.instant
        - navigation.tabs
        - navigation.tabs.sticky
        - navigation.footer
        - navigation.indexes
        - content.tabs.link
        - content.code.copy
    icon:
        repo: fontawesome/brands/github

extra_javascript:
    - _build/js/mathjax.js
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
    - _build/css/extra.css
extra:
    analytics:
        provider: plausible
        domain: guide.pola.rs,combined.pola.rs

# Preview controls
strict: true

# Formatting options
markdown_extensions:
    - admonition
    - md_in_html
    - pymdownx.details
    - attr_list
    - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - pymdownx.superfences
    - pymdownx.tabbed:
          alternate_style: true
    - pymdownx.snippets:
          base_path: [".", "docs/source/src/"]
          check_paths: true
          dedent_subsections: true
    - footnotes
    - pymdownx.arithmatex:
          generic: true

hooks:
    - docs/source/_build/scripts/people.py

plugins:
    - search:
          lang: en
    - markdown-exec
    - material-plausible
    - macros:
          module_name: docs/source/_build/scripts/macro
    - redirects:
          redirect_maps:
              "user-guide/index.md": "index.md"
              "user-guide/basics/index.md": "user-guide/getting-started.md"
              "user-guide/basics/reading-writing.md": "user-guide/getting-started.md"
