name: Test Rust

on:
  pull_request:
    paths:
      - crates/**
      - examples/**
      - Cargo.toml
      - .github/workflows/test-rust.yml
  push:
    branches:
      - main
      - "2.0"
    paths:
      - crates/**
      - examples/**
      - Cargo.toml
      - .github/workflows/test-rust.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -C debuginfo=0  # Do not produce debug symbols to keep memory usage down
  RUST_BACKTRACE: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Free some disk space (remove unused packages)
        uses: jlumbroso/free-disk-space@v1.3.1
        if: ${{ runner.os == 'Linux' }}

      - name: Set up Rust
        run: rustup show

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          env-vars: ImageVersion
          save-if: ${{ github.event_name == 'push' }}
          key: ${{ github.ref_name }}

      # Note that we specify --lib, --bins etc
      # to exclude the doc tests.
      - name: Compile tests
        run: >
          cargo test --lib --tests --bins --all-features --no-run
          -p polars-arrow
          -p polars-compute
          -p polars-core
          -p polars-io
          -p polars-lazy
          -p polars-ops
          -p polars-parquet
          -p polars-plan
          -p polars-row
          -p polars-sql
          -p polars-time
          -p polars-utils

      - name: Run tests
        if: github.event_name == 'pull_request'
        run: >
          cargo test --lib --tests --bins --all-features
          -p polars-arrow
          -p polars-compute
          -p polars-core
          -p polars-io
          -p polars-lazy
          -p polars-ops
          -p polars-parquet
          -p polars-plan
          -p polars-row
          -p polars-sql
          -p polars-time
          -p polars-utils

  integration-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Free some disk space (remove unused packages)
        uses: jlumbroso/free-disk-space@v1.3.1
        if: ${{ runner.os == 'Linux' }}

      - name: Set up Rust
        run: rustup show

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          env-vars: ImageVersion
          save-if: ${{ github.event_name == 'push' }}
          key: ${{ github.ref_name }}

      - name: Compile integration tests
        run: cargo test --all-features -p polars --test it --no-run

      - name: Run integration tests
        if: github.event_name == 'pull_request'
        run: cargo test --all-features -p polars --test it

  check-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free some disk space (remove unused packages)
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Set up Rust
        run: rustup show

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          env-vars: ImageVersion
          save-if: ${{ github.event_name == 'push' }}
          key: ${{ github.ref_name }}

      - name: Install cargo hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - name: Run cargo hack
        run: cargo hack check -p polars --each-feature --no-dev-deps && cargo check -p polars-stream

  check-dsl-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free some disk space (remove unused packages)
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Set up Rust
        run: rustup show

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          env-vars: ImageVersion
          save-if: ${{ github.event_name == 'push' }}
          key: ${{ github.ref_name }}

      - name: Build DSL schema check
        run: cargo build --all-features

      - name: Run DSL schema check
        run: ./target/debug/dsl-schema check-hashes
